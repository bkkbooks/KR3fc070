body:
  text: 股二勾三弦數取徑過迂取數過大由其不求勾而先求弦也第六題有勾弦和有弦較和求勾股弦法以勾弦和弦較和相乘為長方積以勾弦和為長闊較用帶縱較數開方算之四因積與長闊較自乘相加開平方得長闊和和較相加折半為弦和和相減折半為股弦和和弦較和相減折半為勾勾減勾弦和為弦捷法四因弦較和與勾弦和相加轉乘勾弦和開方得長闊和是題舊術以勾弦和自乘得數又以勾弦和弦較和相加自乘得數兩數相加為長方積以三勾弦和與二弦較和相加為長闊和用和數開方算之得闊折半為弦今考其長方其闊為二弦數其長為一勾二股三弦數取徑過迂取數過大由其不求股而先求弦也第七題有股弦和有弦和較求勾股弦法以股弦和弦和較相乘為長方積以股弦和為長闊和用帶縱和數開方算之四因積與長闊和自乘相減開平方得長闊較和較相加折半為弦較和相減折半為勾弦較和弦和較相加折半為股股減股弦和為弦捷法四因弦和較與股弦和相減轉乘股弦和開方得長闊較是題舊術以股弦和自乘得數又以股弦和弦和較相加轉與股弦和相乘得數兩數相減為長方積以股弦和為長闊和用和數開方算之得闊為勾今考其長方積實即股弦和弦和較相乘之數
  hash: sha256:54e6b9f6313394ca73df7f5dc155aab4102e3f4c3a0dd733d0cab683fe942083

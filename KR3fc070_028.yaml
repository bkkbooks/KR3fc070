body:
  text: 法以弦與弦較和相減為勾股較有勾股較有弦較較求勾股弦法以勾股較弦較較相加為弦有勾股較有弦較和求勾股弦法以勾股較弦較和相減為弦有弦較較有弦較和求勾股弦法以弦較較弦較和相加折半為弦相減折半為勾股較以上五題加減之皆可得弦與勾股較乃以第二術第一題求勾股法算之有弦有弦和較求勾股法以弦與弦和較相加為勾股和有弦有弦和和求勾股法以弦與弦和和相減為勾股和有勾股和有弦和較求勾股弦法以勾股和弦和較相減為弦有勾股和有弦和和求勾股弦法以勾股和弦和和相減為弦有弦和較有弦和和求勾股弦法以弦和較弦和和相減折半為弦相加折半為勾

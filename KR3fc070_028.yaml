body:
  text: 法以弦與弦較和相減爲勾股較有勾股較有弦較較求勾股弦法以勾股較弦較較相加爲弦有勾股較有弦較和求勾股弦法以勾股較弦較和相減爲弦有弦較較有弦較和求勾股弦法以弦較較弦較和相加折半爲弦相減折半爲勾股較以上五題加減之皆可得弦與勾股較迺以第二術第一題求勾股法算之有弦有弦和較求勾股法以弦與弦和較相加爲勾股和有弦有弦和和求勾股法以弦與弦和和相減爲勾股和有勾股和有弦和較求勾股弦法以勾股和弦和較相減爲弦有勾股和有弦和和求勾股弦法以勾股和弦和和相減爲弦有弦和較有弦和和求勾股弦法以弦和較弦和和相減折半爲弦相加折半爲勾

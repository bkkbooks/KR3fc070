body:
  text: 各積既等即可互求今六術中八題所知者恆為一率四率又知一率即二三率之較或和故用帶縱開方求之得二三率也一率何以為二三率之較或和也蓋一率即連比例首率二率即連比例中率而三率又即連比例首中率之較或和其在首中率相加為三率者則為首中率其數內減去等中率之二率必餘等首率之一率故一率為較其在首中率相減為三率而中率太首率小者則為中率內減首率餘數以此減等中率之二率亦必餘等首率之一率故一率仍為較首率太中率小者則為首率內減中率餘數以此加等中率之二率始得等首率之一率故一率為和又此八種比例用加法者四種用減法而首率小者二種故較有六用減法而首率大者二種故和止二也
  hash: sha256:af2c14a80dfe7785bb55533f0b9f97a339254ee76e60ddac8dbf15363d69128d

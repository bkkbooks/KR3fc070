body:
  text: 各積旣等卽可互求今六術中八題所知者恒爲一率四率又知一率卽二三率之較或和故用帶縱開方求之得二三率也一率何以爲二三率之較或和也蓋一率卽連比例首率二率卽連比例中率而三率又卽連比例首中率之較或和其在首中率相加爲三率者則爲首中率其數內減去等中率之二率必餘等首率之一率故一率爲較其在首中率相減爲三率而中率太首率小者則爲中率內減首率餘數以此減等中率之二率亦必餘等首率之一率故一率仍爲較首率太中率小者則爲首率內減中率餘數以此加等中率之二率始得等首率之一率故一率爲和又此八種比例用加法者四種用減法而首率小者二種故較有六用減法而首率大者二種故和止二也
  hash: sha256:70c3a22e05f3d0057066aca1f63137a709a3a1e4353327a2ee8d75069f4348e7

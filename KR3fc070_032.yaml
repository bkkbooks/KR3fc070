body:
  text: 有股弦和有弦較和求勾股弦法以股弦和弦較和相減為勾有股弦和有弦和和求勾股弦法以股弦和弦和和相減為勾有弦較和有弦和和求勾股弦法以弦較和弦和和相減折半為勾相加折半為股弦和以上五題加減之皆可得勾與股弦和乃以第三術第二題求股弦法算之有股有弦和較求勾弦法以股與弦和較相減為勾弦較有股有弦較和求勾弦法以股與弦較和相減為勾弦較有勾弦較有弦和較求勾股弦法以勾弦較弦和較相加為股有勾弦較有弦較和求勾股弦法以勾弦較弦較和相減為股有弦和較有弦較和求勾股弦法以弦和較弦較和相加折半為股相減折半為勾弦較

body:
  text: 闊邊為勾弦和長邊為股弦和勾弦和股弦較相乘為長方其長闊較即勾股和倍其積與弦較較自乘方等何也如圖甲丁為弦甲乙等甲己為股甲戊等丁卯為勾丙壬癸丙皆等則己丁乙戊皆即股弦較乙壬丑已皆即勾弦和丁卯勾加己丁股弦較得己卯甲己股減甲卯勾弦和亦得己卯則己卯必為弦較較以弦較較即勾較和股和較也説見加減法丑庚庚子皆等乙甲丙丁弦方內減去戊甲庚己股方餘乙戊丙庚丁己磬折形必與癸丙辛壬勾方等積此勾方若加一丑癸庚丙子壬磬折形即為丑庚辛子弦較較自乘方則乙戊丙庚丁已磬折形若加一丑癸庚丙子壬磬折形亦必為丑庚辛子弦較較自乘方而此兩磬折形相加原不異於乙戊壬子癸丑己丁兩長方相加然則己丁股弦較丁癸勾弦和相乘倍之為兩長方亦即與丑庚辛子弦較較方等積矣故有勾弦和股弦較則以一和一較相乘倍之為乙戊壬子癸丑己丁兩長方亦即為丑庚辛子一正方平方法開之得已卯弦較較即丑辛置已卯弦較較減丁已股弦較得丁卯勾減甲卯勾弦和得甲已股
  hash: sha256:02c453c269d91602c2e9730bc2faa356c5c42b26440b8fdb54fb4af174e067d8

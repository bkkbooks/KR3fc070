body:
  text: 弦則乙丙卽勾股較甲丁卽勾弦和以乙丙勾股較與乙丁弦相減餘丙丁爲弦較較而丙丁者又卽甲丙股甲丁勾弦和相減數是亦股與勾弦和之較也故卽股和較弦較和卽勾和較股較和何也如前圖甲乙爲勾甲丙爲股丙丁爲弦則乙丙卽勾股較甲丁卽股弦和以乙丙勾股較與丙丁弦相加得乙丁爲弦較和而此乙丁者又卽甲乙勾甲丁股弦和相減數是亦勾與股弦和之較也故卽勾和較如後圖甲乙爲勾甲丙爲股丁乙爲弦則乙丙卽勾股較丁甲卽勾弦較以乙丙勾股較與丁乙弦相加得丁丙爲弦較和而此丁丙者又卽甲丙股丁甲勾弦較相加數是亦股與勾弦較之和也故卽股較和勾股較卽勾弦較股弦較之較何也如圖甲乙爲勾甲丙爲股甲丁爲弦則乙丙卽勾股較乙丁卽勾弦較丙丁卽股弦較以乙丁勾弦較丙丁股弦較相減餘乙丙卽勾股較是則勾股較者亦勾弦較股弦較之較也勾股較卽勾弦和股弦和之較何也如圖甲乙爲勾

body:
  text: 弦則乙丙即勾股較甲丁即勾弦和以乙丙勾股較與乙丁弦相減餘丙丁為弦較較而丙丁者又即甲丙股甲丁勾弦和相減數是亦股與勾弦和之較也故即股和較弦較和即勾和較股較和何也如前圖甲乙為勾甲丙為股丙丁為弦則乙丙即勾股較甲丁即股弦和以乙丙勾股較與丙丁弦相加得乙丁為弦較和而此乙丁者又即甲乙勾甲丁股弦和相減數是亦勾與股弦和之較也故即勾和較如後圖甲乙為勾甲丙為股丁乙為弦則乙丙即勾股較丁甲即勾弦較以乙丙勾股較與丁乙弦相加得丁丙為弦較和而此丁丙者又即甲丙股丁甲勾弦較相加數是亦股與勾弦較之和也故即股較和勾股較即勾弦較股弦較之較何也如圖甲乙為勾甲丙為股甲丁為弦則乙丙即勾股較乙丁即勾弦較丙丁即股弦較以乙丁勾弦較丙丁股弦較相減餘乙丙即勾股較是則勾股較者亦勾弦較股弦較之較也勾股較即勾弦和股弦和之較何也如圖甲乙為勾

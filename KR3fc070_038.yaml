body:
  text: 勾股六術圖解第一術弦方內兼有一勾方一股方何也如圖甲乙丙勾股庚己甲辛戊庚丙丁辛皆與之等乙丙為勾甲己戊庚辛丁皆等甲乙為股庚己辛戊丙丁皆等甲丙為弦甲庚庚辛辛丙皆等則甲庚丙辛必為弦自乘方乃移丙丁辛勾股置於甲壬庚移辛戊庚勾股置於丙癸甲又自戊至子作線截之則易為癸子丙丁一股方子壬戊庚一勾方矣蓋丙丁為股丙癸亦為股則癸子丙丁必為股自乘方戊庚為勾壬庚亦為勾則子壬戊庚必為勾自乘方故勾股求弦以勾方股方相加為弦方勾弦求股以勾方弦方相減為股方股弦求勾以股方弦方相減為勾方皆平方開之得勾股弦也第二術弦方倍之兼有一勾股較方一勾股和方何也如圖甲丁辛勾股形甲丁丙戊為弦方甲丁為弦四邊皆等故為弦方內容甲丁辛丁戊已戊丙庚丙甲乙四勾股積已庚辛乙一勾股較方丁辛股減丁已勾餘已辛為勾股較辛乙乙庚庚已皆等故為勾股較方
  hash: sha256:b9c6ac105a068ed16ce05e33d9770fea7afb372192eb22c82ff6ef528799b440

body:
  text: 余在都獲典頂君梅侶交輒以數學相過從梅侶耽精思當窮極要眇時雖寒暑饑渴不暇顧苟有得則欣然意適若無可喻於人嘗語余日寄中西成法搬衍較量疇人子弟優爲之所貴學數者謂能推見本原融會以通其變竟古人未竟之緒而發古人未發之藏耳余是其言顧以碌碌走麈俗未遑卒業迨余筮仕浙梅侶亦主講苕南是所著勾股六術擊節稱善曰是足爲數學導矣句股乃學數初步恒苦和較請術之紛糅未入門先作門前之繞往往阻於難而莫敢入得是術導之簡而明條焉而不紊一展卷瞭然矣且以見數有和較故變生變故參伍錯綜不可爲典要其爲物也雜而其爲途也繁設非洞徹乎其原焉能齊雜以整御繁以約極其變而仍適得其常哉梅侶嘗立有弧三角總較術求橢圓弧線術術雖定未有詮釋余促成之而義奧趣幽非旦夕可竟事是六術也獨先成雖未足見梅侶之深而所謂變通成法爲古人竟其緒而發其藏者於是可見一班云道光壬辰秋七月下浣三日順德黎應南序

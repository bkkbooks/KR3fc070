body:
  text: 勾股相求舊術詳且備矣惟和較諸題術稍繁雜初學恆未了然乙酉夏偶與邵君魚竹陳君辛伯縱論及此爰取舊術稍為變通分術為六使題之相同者通為一術苟得其意釐然悉有以御之繁雜可無復慮亦足為入門之一助云第一術第一題有勾有股求弦法以勾股各自乘相併為實平方開之得弦第二題有勾有弦求股法以勾弦各自乘相減為實平方開之得股第三題有股有弦求勾法以股弦各自乘相減為實平方開之得勾第二術第一題有弦有勾股較求勾股法以弦自乘倍之與勾股較自乘相減為實平方開
  hash: sha256:ffc825a50987f4f6dc23bd72a83757ac259f41e8e4da0304b17c9c8bfd53a749

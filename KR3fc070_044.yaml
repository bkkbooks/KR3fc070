body:
  text: 為弦則甲丙即勾股和乙丁即勾弦較以甲丙勾股和與甲丁弦相減餘丁丙為弦和較而此丁丙者又即乙丙股乙丁勾弦較相減數是亦股與勾弦較之較也故即股較較弦和和即勾和和股和和何也如前圖甲乙為勾乙丙為股丙丁為弦則甲丙即勾股和乙丁即股弦和以甲丙勾股和與丙丁弦相加得甲丁為弦和和而此甲丁者又即甲乙勾乙丁股弦和相加數是亦勾與股弦和之和也故即勾和和如後圖甲乙為勾乙丙為股丁甲為弦則甲丙即勾股和丁乙即勾弦和以甲丙勾股和與丁甲弦相加得丁丙為弦和和而此丁丙者又即乙丙股丁乙勾弦和相加數是亦股與勾弦和之和也故即股和和弦較較即勾較和股和較何也如前圖甲乙為勾甲丙為股丁丙為弦則乙丙即勾股較丁甲即股弦較以乙丙勾股較與丁丙弦相減餘丁乙為弦較較而丁乙者又即甲乙勾丁甲股弦較相加數是亦勾與股弦較之和也故即勾較和如後圖甲乙為勾甲丙為股乙丁為

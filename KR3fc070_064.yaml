body:
  text: 方等積若各減一甲戊乙已方則乙已丁辛股弦較弦較和相乘方亦必與戊壬已癸勾乘弦和較方等積矣故有股弦較弦較和則以兩數相乘為乙已丁辛長方亦可為戊壬已癸長方其闊邊戊壬長邊壬癸之較即甲戊股弦較乃用帶縱開方法算之得長邊壬癸為勾以甲乙勾加乙丁弦較和得甲丁股弦和與股弦較相加減各折半為弦與股也勾弦較弦較較相乘與股乘弦和較等積因以勾弦較為長闊較何也如圖甲乙為股甲壬壬癸皆等甲丙為勾丙子等丙丁為弦則子丁必為勾弦較子丑甲戊皆等甲丁亦必為勾弦和以甲乙股與甲丁勾弦和相減餘乙丁為弦較較以甲壬股與甲戊勾弦較相減餘戊壬為弦和較説見加減甲壬乙癸股方原與甲戊丁辛勾弦較勾弦和相乘方等積若各減一甲戊乙已長方則乙已丁辛勾弦較弦較較相乘方亦必與戊壬己癸股乘弦和較方等積矣故有勾弦較弦較較則以兩數相乘為乙已丁辛長方亦可為戊壬已癸長方其闊邊戊壬長邊壬癸之較即甲戊勾弦較乃用帶縱開方法算之得長邊壬癸為股以甲乙股加乙丁弦較較得甲丁

body:
  text: 四術第一題求勾股弦法算之有勾股較有股弦和求勾股弦法以勾股較股弦和相減為勾弦和有勾股較有勾弦和求勾股弦法以勾股較勾弦和相加為股弦和以上二題加減之皆可得勾弦和股弦和乃以第四術第二題求勾股弦法算之有勾股和有股弦較求勾股弦法以勾股和股弦較相加為勾弦和有勾股和有勾弦和求勾股弦法以勾股和勾弦和相減為股弦較以上二題加減之皆可得勾弦和股弦較乃以第四術第三題求勾股弦法算之有勾股和有股弦和求勾股弦法以勾股和股弦和相減為勾弦較有勾股和有勾弦較求勾股弦法以勾股和勾弦較相加為股弦和以上二題加減之皆可得勾弦較股弦和乃以第四術第四題求勾股弦法算之

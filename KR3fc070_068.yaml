body:
  text: 丁為弦和和以乙已股與已壬勾弦較相加得乙壬為弦較和説見加減甲戊乙已股方原與已壬辛癸勾弦較勾弦和相乘方等積若各加一乙已丁辛長方則乙壬丁癸勾弦和弦較和相乘方亦必與甲戊丁辛股乘弦和和方等積矣故有勾弦和弦較和則以兩數相乘為乙壬丁癸長方亦可為甲戊丁辛長方其長邊甲丁闊邊甲戊之較即乙丁勾弦和乃用帶縱開方法算之得闊邊甲戊為股以乙已股減乙壬弦較和餘已壬為勾弦較與勾弦和相加減各折半為弦與勾也股弦和弦和較相乘與勾乘弦較和等積因以股弦和為長闊和何也如圖甲乙為勾甲戊等甲丙為股丙子等丙丁為弦則子丁必為股弦較午癸午丑寅戊皆等甲丁必為股弦和戊辛等以甲乙勾與甲丁股弦和相減餘乙丁為弦較和以甲戊勾與寅戊股弦較相減餘甲寅為弦和較説見加減甲戊乙已勾方原與寅戊癸辛股弦較股弦和相乘方等積若各減一寅戊壬已方又各加一乙壬丁癸方則甲寅丁癸股弦和弦和較相乘方亦必與
  hash: sha256:db735bdce3513c5f0d6d96ead4d524b1f8e48f4336efd8979a61fc49a7669d86

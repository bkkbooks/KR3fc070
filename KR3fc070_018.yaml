body:
  text: 股較其長為二股內少一股弦較數輾轉相求僅得勾股較不如徑求勾之直捷也第四題有勾弦較有弦較較求勾股弦法以勾弦較弦較較相乘為長方積以勾弦較為長闊較用帶縱較數開方算之四因積與長闊較自乘相加開平方得長闊和和較相減折半為弦和較相加折半為股弦和較弦較較相加折半為勾勾加勾弦較為弦捷法四因弦較較與勾弦較相加轉乘勾弦較開方得長闊和是題舊術以弦較較自乘得數又以勾弦較弦較較相加自乘得數兩數相減再以勾弦較自乘得數轉減前減餘數折半為長方積以勾弦較為長闊較用較數開方算之得長為股今考其長方積本即勾弦較弦較較相乘之數毋庸纍次自乘展轉相減也第五題有股弦和有弦較較求勾股弦法以股弦和弦較較相乘為長方積以股弦和為長闊較用帶縱較數開方算之四因積與長闊較自乘相加開平方得長闊和和較相加折半為弦和和相減折半為勾弦和和弦較較相減折半為股股減股弦和為弦捷法四因弦較較與股弦和相加轉乘股弦和開方得長闊和是題舊術以股弦和自乘得數股弦和弦較較相加自乘得數兩數相加為長方積以三股弦和與二弦較較相加為長闊和用和數開方算之得闊折半為弦今考其長方其闊為二弦數其長為一

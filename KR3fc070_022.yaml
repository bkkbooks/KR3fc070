body:
  text: 毋庸自乘相乘加減也第八題有勾弦和有弦和較求勾股弦法以勾弦和弦和較相乘為長方積以勾弦和為長闊和用帶縱和數開方算之四因積與長闊和自乘相減開平方得長闊較和較相減折半為弦較較相加折半為股若四因積與長闊和自乘相減適盡徑以長闊和折半為弦較較又為股弦較較弦和較相加折半為勾勾減勾弦和為弦是題得長闊較後三因較加兩弦和較得數小於長闊和或與之等則有兩答如本法求之得一式勾股弦又易弦較較為股股為弦較較另得一式勾股弦若得數大於長闊和第可如本法求之不能互易無兩答也捷法四因弦和較與勾弦和相減轉乘勾弦和開方得長闊較是題舊術以勾弦和自乘得數又以勾弦和弦和較相加轉與勾弦和相乘得數兩數相減為長方積以勾弦和為長闊和用和數開方算之得長為股今考其長方積本即勾弦和弦和較相乘之數毋庸自乘相乘加減也是術八題意本一例意既同即立術不容或異今更定之較為條理井然一絲不紊而錯宗參伍亦莫不各盡其致矣勾股弦及其和較凡十三件任舉二件皆可命題總計之題凡七十有八今六術中題止二十五者以其餘五十三題加減之可易為術中題也今詳列餘題題其加減法附於六術之後庶和較諸題於是備云

body:
  text: 較用帶縱較數開方算之二因倍積與長闊較自乘相加開平方得長闊和和較相減折半為勾弦較相加折半為股弦和如第四術第四題遞減之得勾股弦是題舊術以勾股和自乘得數又以弦較和自乘得數兩數相加為長方積倍弦較和為長闊較用帶縱較數開方算之得闊為弦是術與第四術本根於一理因勾弦股弦之和較互相乘得各長方各倍之適與和較相疊之四件自乘方等第四術知長方兩邊因求得平方邊是術知平方邊及長方兩邊較因求得長方兩邊蓋一理之所通極錯綜亦極齊整題雖雜出而所以御之者則甚約也舊術雜求他件固亦足以參校究不如約歸一理使初學易尋頭緒耳第六術第一題有股弦較有弦和和求勾股弦法以股弦較弦和和相乘為長方積以股弦較為長闊較用帶縱較數開方算之四因積與長闊較自乘相加開平方得長闊和和較相加折半為弦較較相減折半為勾弦較較弦和和相減折半為股股加股弦較為弦捷法四因弦和和與股弦較相加轉乘股弦較開方得長闊和是題舊術以弦和和股弦較相減自乘得數相加自乘得數兩髏相減餘四歸之為長方積以股弦較為長闊較用較數開方算之得闊為勾今考其長方積原即股弦較弦和和相乘之數蓋兩數相

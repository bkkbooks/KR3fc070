body:
  text: 甲丙爲股丁甲爲弦則乙丙卽勾股較丁乙卽勾弦和丁丙卽股弦和以丁乙勾弦和丁丙股弦和相減餘乙丙卽勾股較是則勾股較者亦勾弦和股弦和之較也勾股和卽勾弦和股弦較之較何也如圖甲乙爲勾乙丙爲股乙丁爲弦則甲丙卽勾股和甲丁卽勾弦和丙丁卽股弦較以甲丁勾弦和丙丁股弦較相減餘甲丙卽勾股和是則勾股和者亦勾弦和股弦較之較也勾股和卽勾弦較股弦和之較何也如圖甲乙爲勾乙丙爲股乙丁爲弦則甲丙卽勾股和甲丁卽勾弦較丙丁卽股弦和以甲丁勾弦較丙丁股弦和相減餘甲丙卽勾股和是則勾股和者亦勾弦較股弦和之較也和較生於加減加減相疊而和較之名每可以互通究之殊其名不殊其實以上數則乃其要者閱圖自明勾弦較股弦較相乘爲長方其長闊較卽勾股較倍其積與弦和較自乘方等何也如圖甲乙爲弦甲丙等甲庚爲股丑辛寅辛皆等戊乙爲勾戊壬等則庚乙必爲股弦

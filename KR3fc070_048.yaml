body:
  text: 甲丙為股丁甲為弦則乙丙即勾股較丁乙即勾弦和丁丙即股弦和以丁乙勾弦和丁丙股弦和相減餘乙丙即勾股較是則勾股較者亦勾弦和股弦和之較也勾股和即勾弦和股弦較之較何也如圖甲乙為勾乙丙為股乙丁為弦則甲丙即勾股和甲丁即勾弦和丙丁即股弦較以甲丁勾弦和丙丁股弦較相減餘甲丙即勾股和是則勾股和者亦勾弦和股弦較之較也勾股和即勾弦較股弦和之較何也如圖甲乙為勾乙丙為股乙丁為弦則甲丙即勾股和甲丁即勾弦較丙丁即股弦和以甲丁勾弦較丙丁股弦和相減餘甲丙即勾股和是則勾股和者亦勾弦較股弦和之較也和較生於加減加減相疊而和較之名每可以互通究之殊其名不殊其實以上數則乃其要者閲圖自明勾弦較股弦較相乘為長方其長闊較即勾股較倍其積與弦和較自乘方等何也如圖甲乙為弦甲丙等甲庚為股丑辛寅辛皆等戊乙為勾戊壬等則庚乙必為股弦
  hash: sha256:9e6e818606f5203d1dae410579e8d7490841898b6d9be5a99c6b24af100a2329

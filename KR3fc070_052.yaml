body:
  text: 其積與弦和和自乘方等何也如圖寅戊為弦庚己巳丑皆等戊乙為股壬子子癸皆等甲寅為勾辛甲等則寅乙必為股弦和丙辛等甲戊必為勾弦和辛丑癸乙皆等甲寅勾加寅乙股弦和得甲乙戊乙股加甲戊勾弦和亦得甲乙則甲乙必為弦和和以弦和和即勾和和股和和也說見加減法丙甲等辛甲已寅一勾方壬子丁癸一股方相加既與庚己子丑一弦方等積則丙辛壬丑及庚寅癸乙勾弦和股弦和相乘兩長方亦必與丙甲丁乙弦和和自乘方等積矣蓋此兩長方相加所疊者為庚已子丑弦方所空者為辛甲已寅勾方壬子丁癸股方以所疊補其所空即成丙甲丁乙弦和和方故有勾弦和股弦和則以兩和相乘倍之為丙辛壬丑庚寅癸乙兩長方亦即為丙甲丁乙一正方平方法開之得甲乙弦和和置甲乙弦和和減寅乙股弦和得甲寅勾減甲戊勾弦和得戊乙股併甲戊勾弦和寅乙股弦和與之相減即寅戊弦又勾弦和股弦和相減即勾股較說見加減法今庚寅癸乙長方其長闊兩邊既為勾弦和股弦和則其兩邊較必為勾股較故有勾股較弦和和則以弦和和自乘為丙甲丁乙方半之即寅庚癸乙長方積乃以勾股較為長闊兩邊較用帶縱開方算之得

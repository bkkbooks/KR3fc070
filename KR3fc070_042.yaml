body:
  text: 為甲庚壬癸長方其闊甲庚即股弦較庚乙股減甲乙弦餘甲庚即股弦較其長邊甲壬即股弦和丙壬即丁辛亦即庚乙皆為股加甲丙弦得甲壬即股弦和此長方亦必與勾方等積故以勾自乘為勾方即可為甲壬庚癸長方在有較求和者則以甲庚股弦較之而得甲壬股弦和在有和求較者則以甲壬股弦和除之而得甲庚股弦較也設甲乙為弦庚乙為勾則磬折形所易之長方必與股方等積其闊邊甲庚即勾弦較長邊甲壬即勾弦和故以股自乘為股方即可為甲庚壬癸長方較求和以甲庚勾弦較除之而得甲壬勾弦和和求較以甲壬勾弦和除之而得甲庚勾弦較同一理也第四術第五術是兩術本同一理故可合論又須先明加減而後乘除等積之故顯然易明故首論加減弦和較即勾較較股較較何也如前圖甲乙為勾乙丙為股丁丙為弦則甲丙即勾股和乙丁即股弦較以甲丙勾股和與丁丙弦相減餘甲丁為弦和較而此甲丁者又即甲乙勾乙丁股弦較相減數是亦勾與股弦較之較也故即勾較較如後圖甲乙為勾乙丙為股甲丁

body:
  text: 爲甲庚壬癸長方其闊甲庚卽股弦較庚乙股減甲乙弦餘甲庚卽股弦較其長邊甲壬卽股弦和丙壬卽丁辛亦卽庚乙皆爲股加甲丙弦得甲壬卽股弦和此長方亦必與勾方等積故以勾自乘爲勾方卽可爲甲壬庚癸長方在有較求和者則以甲庚股弦較之而得甲壬股弦和在有和求較者則以甲壬股弦和除之而得甲庚股弦較也設甲乙爲弦庚乙爲勾則磬折形所易之長方必與股方等積其闊邊甲庚卽勾弦較長邊甲壬卽勾弦和故以股自乘爲股方卽可爲甲庚壬癸長方較求和以甲庚勾弦較除之而得甲壬勾弦和和求較以甲壬勾弦和除之而得甲庚勾弦較同一理也第四術第五術是兩術本同一理故可合論又須先明加減而後乘除等積之故顯然易明故首論加減弦和較卽勾較較股較較何也如前圖甲乙爲勾乙丙爲股丁丙爲弦則甲丙卽勾股和乙丁卽股弦較以甲丙勾股和與丁丙弦相減餘甲丁爲弦和較而此甲丁者又卽甲乙勾乙丁股弦較相減數是亦勾與股弦較之較也故卽勾較較如後圖甲乙爲勾乙丙爲股甲丁

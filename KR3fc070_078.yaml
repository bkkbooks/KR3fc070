body:
  text: 者止四種則第四五術中之四題可以得其故矣首率勾弦較首率仍為勾弦較中率股中率勾弦較股相減得弦和較末率勾弦和末率勾弦較加勾弦和為倍弦股倍之為倍股相減得倍股弦較首率股弦較首率仍為股弦較中率勾中率股弦較勾相減得弦和較末率股弦和末率股弦較加股弦和為倍弦勾倍之為倍勾相減得倍勾弦較此兩種另式連比例中率皆為弦和較首末率雖不同然以首末相乘要皆為勾弦較股弦較相乘倍之之數而與中率弦和較自乘等積也首率勾弦和首率仍為勾弦和中率股中率勾弦和股相加為弦和和末率勾弦較末率勾弦和加勾弦較為倍弦股倍之為倍股相加為倍股弦和首率股弦和首率仍為股弦和中率勾中率股弦和勾相加為弦和和末率股弦較末率股弦和加股弦較為倍弦勾倍之為倍勾相加為倍勾弦和此兩種另式連比例中率皆為弦和和首末率雖不同然以首末相乘要皆為勾弦和股弦和相乘倍之之數而與中率弦和和自乘等積也首率勾弦和

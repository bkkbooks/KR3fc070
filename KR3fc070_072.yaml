body:
  text: 寅戊為勾弦較與勾弦和相加減各折半為弦與勾也第八題何以一問可兩答也以帶縱方之長闊兩邊一為股一為弦較較股可大於弦較較亦可小於弦較較一大一小故有兩答也然亦有無兩答者何也股雖可小於弦較較而勾弦較不能小於股弦較股內減弦和較餘為勾弦較弦較較內減弦和較餘為倍股弦較若股與弦較較互易勾弦較與倍股弦較亦必互易半其勾弦較而與倍股弦較等或小於倍股弦較則此勾弦較可易為倍股弦較倍股弦較可易為勾弦較無勾弦較小股弦較大之患至半其勾弦較仍大於倍股弦較則不能互易易之勾弦較必小於股弦較故無兩答也術中三因長闊較加兩弦和較與長闊和比其大小以定兩答之有無何也是題長闊較為股與弦較較之較亦即一勾弦較倍股弦較之較長闊和為股與弦較較之和亦即兩弦和較一勾弦較倍股弦較之和半其勾弦較與倍股弦較等者倍股弦較若一勾弦較必二兩相較為一兩相和為三較得和三之一三其較必與一勾弦較倍股弦較之和等加兩弦和較必與長闊和等半其勾
  hash: sha256:fc5bfa710c8624335ab1b2aa045efe71d4bd3e1123eaaa4fd0495412b4c55609

body:
  text: 凡有三率連比例欲易爲四率相當比例仍其首率中率爲一率二率而以首率中率和爲三率則其四率必爲中率末率和以首率中率較爲三率則其四率必爲中率末率較和二十七爲三率二三率相乘一率除之得五十四爲四率此四率五十四卽中率十八末率三十六之和而成另式相當比例矣是以和與和相比也較四爲三率二三率相乘一率除之得六爲四率此四率六卽中率十二末率十八之較而成另式相當比例矣是以較與較相比也今第三術中兩種連比例若更互如法和較之凡得八種相當比例而第六術八題於是可推矣
  hash: sha256:2945049c9af8b66746cfd1dc181bb19d4030bb29e5e4bcc339cb28c834c2d659

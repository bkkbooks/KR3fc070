body:
  text: 凡有三率連比例欲易為四率相當比例仍其首率中率為一率二率而以首率中率和為三率則其四率必為中率末率和以首率中率較為三率則其四率必為中率末率較和二十七為三率二三率相乘一率除之得五十四為四率此四率五十四即中率十八末率三十六之和而成另式相當比例矣是以和與和相比也較四為三率二三率相乘一率除之得六為四率此四率六即中率十二末率十八之較而成另式相當比例矣是以較與較相比也今第三術中兩種連比例若更互如法和較之凡得八種相當比例而第六術八題於是可推矣
  hash: sha256:2fd8ff50498a7734569768c6bf71e4ca2eee3739d271ece6907395bcc829605a

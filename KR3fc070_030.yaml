body:
  text: 股和以上五題加減之皆可得弦與勾股和迺以第一術第二題求勾股法算之有勾有弦和較求股弦法以勾與弦和較相減爲股弦較有勾有弦較較求股弦法以勾與弦較較相減爲股弦較有股弦較有弦和較求勾股弦法以股弦較弦和較相加爲勾有股弦較有弦較較求勾股弦法以股弦較弦較較相減爲勾有弦和較有弦較較求勾股弦法以弦和較弦較較相加折半爲勾相減折半爲股弦較以上五題加減之皆可得勾與股弦較迺以第三術第一題求股弦法算之有勾有弦較和求股弦法以勾與弦較和相加爲股弦和有勾有弦和和求股弦法以勾與弦和和相減爲股弦和

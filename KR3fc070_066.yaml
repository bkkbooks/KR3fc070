body:
  text: 勾弦和與勾弦較相加減各折半為弦與勾也股弦和弦較較相乘與勾乘弦和和等積因以股弦和為長闊較何也如圖甲乙為勾甲戊等乙丙為股丙子等丙丁為弦則子丁必為股弦較丑辛丑卯已壬皆等乙丁必為股弦和已辛等以甲乙勾與乙丁股弦和相加得甲丁為弦和和以乙已勾與已壬股弦較相加得乙壬為弦較較說見加減甲戊乙已勾方原與已壬辛癸股弦較股弦和相乘方等積若各加一乙已丁辛長方則乙壬丁癸股弦和弦較較相乘方亦必與甲戊丁辛勾乘弦和和相等積矣故有股弦和弦較較則以兩數相乘為乙壬丁癸長方亦可為甲戊丁辛長方其長邊甲丁闊邊甲戊之較即乙丁股弦和乃用帶縱開方法算之得闊邊甲戊為勾以乙已勾減乙壬弦較較餘已壬為股弦較與股弦和相加減各折半為弦與股也勾弦和弦較和相乘與股乘弦和和等積因以勾弦和為長闊較何也如圖甲乙為股甲戊等乙丙為勾丙子等丙丁為弦則子丁必為勾弦較丑辛丑卯己壬皆等乙丁必為勾弦和已辛等以甲乙股與乙丁勾弦和相加得甲

body:
  text: 勾弦和與勾弦較相加減各折半爲弦與勾也股弦和弦較較相乘與勾乘弦和和等積因以股弦和爲長闊較何也如圖甲乙爲勾甲戊等乙丙爲股丙子等丙丁爲弦則子丁必爲股弦較丑辛丑卯已壬皆等乙丁必爲股弦和已辛等以甲乙勾與乙丁股弦和相加得甲丁爲弦和和以乙已勾與已壬股弦較相加得乙壬爲弦較較說見加減甲戊乙已勾方原與已壬辛癸股弦較股弦和相乘方等積若各加一乙已丁辛長方則乙壬丁癸股弦和弦較較相乘方亦必與甲戊丁辛勾乘弦和和相等積矣故有股弦和弦較較則以兩數相乘爲乙壬丁癸長方亦可爲甲戊丁辛長方其長邊甲丁闊邊甲戊之較卽乙丁股弦和乃用帶縱開方法算之得闊邊甲戊爲勾以乙已勾減乙壬弦較較餘已壬爲股弦較與股弦和相加減各折半爲弦與股也勾弦和弦較和相乘與股乘弦和和等積因以勾弦和爲長闊較何也如圖甲乙爲股甲戊等乙丙爲勾丙子等丙丁爲弦則子丁必爲勾弦較丑辛丑卯己壬皆等乙丁必爲勾弦和已辛等以甲乙股與乙丁勾弦和相加得甲

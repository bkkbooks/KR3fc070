body:
  text: 第四術用開平方法第五術用帶縱開方法法雖異而理則同故並論之第六術股弦較弦和和相乘與勾乘弦較較等積因以股弦較為長闊較何也如圖甲乙為勾戊已戊壬皆等乙丙為股丙子等丙丁為弦則子丁必為股弦較丁辛甲戊皆等乙丁必為股弦和以甲乙勾與乙丁股弦和相加得甲丁為弦和和以戊壬勾與甲戊股弦較相加得甲壬為弦較較說見加減戊壬已癸勾方原與乙已丁辛股弦較股弦和相乘方等積若各加一甲戊乙巳長方則甲戊丁辛股弦較弦和和相乘方亦必與甲壬乙癸勾乘弦較較方等積矣故有股弦較弦和和則以兩數相乘為甲戊丁辛長方亦可為甲壬乙癸長方其長邊甲壬闊邊壬癸之較壬癸即戊壬即甲戊股弦較乃用帶縱開方法算之得闊邊壬癸為勾以甲乙勾減甲丁弦和和得乙丁股弦和乃與股弦較相加減各折半為弦與股也勾弦較弦和和相乘與股乘弦較和等積因以勾弦較為長闊較何也如圖甲乙為股戊已戊壬皆等乙丙為勾

body:
  text: 乘方原得和方較方相減四之一也第二題有勾弦較有弦和和求勾股弦法以勾弦較弦和和相乘為長方積以勾弦較為長闊較用帶縱較數開方算之四因積與長闊較自乘相加開平方得長闊和和較相加折半為弦較和相減折半為股弦較和弦和和相減折半為勾勾加勾弦較為弦捷法四因弦和和與勾弦較相加轉乘勾弦較開方得長闊和是題舊術以弦和和勾弦較相減自乘得數相加自乘得數兩數相減四歸之為長方積以勾弦較為長闊較用較數開方算之得闊為股今考其長方積亦即勾弦較弦和和相乘之數毋庸兩次自乘相減四歸也第三題有股弦較有弦較和求勾股弦法以股弦較弦較和相乘為長方積以股弦較為長闊較用帶縱較數開方算之四因積與長闊較自乘相加開平方得長闊和和較相減折半為弦和較相加折半為勾弦和較弦較和相加折半為股股加股弦較為弦捷法四因弦較和與股弦較相加轉乘股弦較開方得長闊和是題舊術以股弦較弦較和相減自乘倍之內減弦較和自乘數餘為長方積以股弦較弦較和相減倍之再減股弦較餘為長闊和用和數開方算之得闊折半為勾股較今考其長方其闊為二勾
  hash: sha256:11c299d21a93117254e9b6e8d849ad770c109b273fe32a9dc7383fa0dab98e4b

body:
  text: 丙子等丙丁為弦則子丁必為勾弦較丁辛甲戊皆等乙丁必為勾弦和以甲乙股與乙丁勾弦和相加得甲丁為弦和和以戊壬股與甲戊勾弦較相加得甲壬為弦較和說見加減戊壬已癸股方原與乙已丁辛勾弦較勾弦和相乘方等積若各加一甲戊乙已長方則甲戊丁辛勾弦較弦和和相乘方亦必與甲壬乙癸股乘弦較和方等積矣故有勾弦較弦和和則以兩數相乘為甲戊丁辛長方亦可為甲壬乙癸長方其長邊甲壬闊邊壬癸之較即甲戊勾弦較乃用帶縱開方法算之得闊邊壬癸為股以甲乙股減甲丁弦和和得乙丁勾弦和與勾弦較相加減各折半為弦與勾也股弦較弦較和相乘與勾乘弦和較等積因以股弦較為長闊較何也如圖甲乙為勾甲壬壬癸皆等甲丙為股丙子等丙丁為弦則子丁必為股弦較甲戊丁辛皆等甲丁必為股弦和以甲乙勾與甲丁股弦和相減餘乙丁為弦較和以甲壬勾與甲戊股弦較相減餘戊壬為弦和較說見加減甲壬乙癸勾方原與甲戊丁辛股弦較股弦和相乘
  hash: sha256:559772bfec9a67c0a6c98e8ea1cceda1ab652a4b65fcc9b659b918ba91fcbc26

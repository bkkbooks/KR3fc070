body:
  text: 丙子等丙丁爲弦則子丁必爲勾弦較丁辛甲戊皆等乙丁必爲勾弦和以甲乙股與乙丁勾弦和相加得甲丁爲弦和和以戊壬股與甲戊勾弦較相加得甲壬爲弦較和說見加減戊壬已癸股方原與乙已丁辛勾弦較勾弦和相乘方等積若各加一甲戊乙已長方則甲戊丁辛勾弦較弦和和相乘方亦必與甲壬乙癸股乘弦較和方等積矣故有勾弦較弦和和則以兩數相乘爲甲戊丁辛長方亦可爲甲壬乙癸長方其長邊甲壬闊邊壬癸之較卽甲戊勾弦較乃用帶縱開方法算之得闊邊壬癸爲股以甲乙股減甲丁弦和和得乙丁勾弦和與勾弦較相加減各折半爲弦與勾也股弦較弦較和相乘與勾乘弦和較等積因以股弦較爲長闊較何也如圖甲乙爲勾甲壬壬癸皆等甲丙爲股丙子等丙丁爲弦則子丁必爲股弦較甲戊丁辛皆等甲丁必爲股弦和以甲乙勾與甲丁股弦和相減餘乙丁爲弦較和以甲壬勾與甲戊股弦較相減餘戊壬爲弦和較說見加減甲壬乙癸勾方原與甲戊丁辛股弦較股弦和相乘

body:
  text: 中率股中率勾弦和股相減爲弦較較末率勾弦較末率勾弦和加勾弦較爲倍弦股倍之爲倍股相加爲倍股弦較首率股弦較首率仍爲股弦較中率勾中率股弦較勾相加爲弦較較末率股弦和末率股弦較加股弦和爲倍弦勾倍之爲倍勾相加爲倍勾弦和此兩種另式連比例中率皆爲弦較較首末率雖不同然以首末相乘要皆爲勾弦和股弦較相乘倍之之數而與中率弦較較自乘等積也首率勾弦較首率仍爲勾弦較中率股中率勾弦較股相加得弦較和末率勾弦和末率勾弦較加勾弦和爲倍弦股倍之爲倍股相加得倍股弦和首率股弦和首率仍爲股弦和中率勾中率股弦和勾相減得弦較和末率股弦較末率股弦和加股弦較爲倍弦勾倍之爲倍勾相減得倍勾弦較此兩種另式連比例中率皆爲弦較和首末率雖不同然以首末相乘要皆爲勾弦較股弦和相乘倍之之數而與中率弦較和自乘等積也旣因比例而知等積卽因等積而悟開方第四術以首率末率求中率故用開平方第五術知中率又知首率與半末率之較求首末率故用帶縱開方也

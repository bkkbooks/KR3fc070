body:
  text: 較丑甲寅丁皆等甲戊必為勾弦較丁已等戊乙勾減庚乙股弦較餘戊庚甲庚股減甲戊勾弦較亦餘戊庚則戊庚必為弦和較以弦和較即勾較較股較較故也説見加減法壬癸壬子皆等壬戊已乙一勾方丙丑寅辛一股方相加既與丙甲乙丁一弦方等積則丑甲癸戊及寅子丁已勾弦較股弦較相乘兩長方亦必與壬癸子辛弦和較自乘方等積矣蓋勾方股方相加較之弦方疊一壬癸子辛方而空丑甲癸戊寅子丁已兩長方則所空者必與所疊者等積故有勾弦較股弦較則以兩較相乘倍之為丑甲癸戊寅子丁己兩長方亦即為壬癸子辛一正方平方法開之得癸辛弦和較即戊庚置戊庚弦和較加庚乙股弦較得戊乙勾加甲戊勾弦較得甲庚股加庚乙股弦較甲戊勾弦較得甲乙弦又勾弦較股弦較相減即勾股較説見加減法今丑甲癸戊長方其長闊兩邊既為勾弦較股弦較則其兩邊較必為勾股較故有勾股較弦和較則以弦和較自乘為壬癸子辛方半之即丑甲癸戊長方積乃以勾股較為長闊兩邊較用帶縱開方算之得闊邊為股弦較長邊為勾弦較勾弦和股弦和相乘為長方其長闊較即勾股較倍

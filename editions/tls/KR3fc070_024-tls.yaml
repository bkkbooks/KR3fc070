body:
  text: 附題有勾有勾股較求股弦法以勾與勾股較相加爲股有勾有勾股和求股弦法以勾與勾股和相減爲股有股有勾股較求勾弦法以股與勾股較相減爲勾有股有勾股和求勾弦法以股與勾股和相減爲勾有勾股較有勾股和求勾股弦法以勾股較勾股和相減折半爲勾相加折半爲股以上五題加減之皆可得勾與股迺以第一術第一題求弦法算之有勾有勾弦較求股弦法以勾與勾弦較相加爲弦有勾有勾弦和求股弦法以勾與勾弦和相減爲弦有弦有勾弦較求勾股法以弦與勾弦較相減爲勾有弦有勾弦和求勾股

body:
  text: 丁爲弦和和以乙已股與已壬勾弦較相加得乙壬爲弦較和說見加減甲戊乙已股方原與已壬辛癸勾弦較勾弦和相乘方等積若各加一乙已丁辛長方則乙壬丁癸勾弦和弦較和相乘方亦必與甲戊丁辛股乘弦和和方等積矣故有勾弦和弦較和則以兩數相乘爲乙壬丁癸長方亦可爲甲戊丁辛長方其長邊甲丁闊邊甲戊之較卽乙丁勾弦和乃用帶縱開方法算之得闊邊甲戊爲股以乙已股減乙壬弦較和餘已壬爲勾弦較與勾弦和相加減各折半爲弦與勾也股弦和弦和較相乘與勾乘弦較和等積因以股弦和爲長闊和何也如圖甲乙爲勾甲戊等甲丙爲股丙子等丙丁爲弦則子丁必爲股弦較午癸午丑寅戊皆等甲丁必爲股弦和戊辛等以甲乙勾與甲丁股弦和相減餘乙丁爲弦較和以甲戊勾與寅戊股弦較相減餘甲寅爲弦和較說見加減甲戊乙已勾方原與寅戊癸辛股弦較股弦和相乘方等積若各減一寅戊壬已方又各加一乙壬丁癸方則甲寅丁癸股弦和弦和較相乘方亦必與
  hash: sha256:2312c6932d1827200a3f3f8a3cd755ad2ab133f41be2a594c64ac3c45636437f

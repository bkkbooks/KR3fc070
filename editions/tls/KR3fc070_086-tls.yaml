body:
  text: 首率股弦和一率仍爲股弦和二率仍爲勾中率勾三率股弦和勾相加得弦和和末率股弦較四率勾股弦較相加得弦較較此股弦和弦較較相乘所以與勾乘弦和和等積也首率勾弦和一率仍爲勾弦和二率仍爲股中率股三率勾弦和股相加得弦和和末率勾弦較四率股勾弦較相加得弦較和此勾弦和弦較和相乘所以與股乘弦和和等積也首率股弦和一率仍爲股弦和二率仍爲勾中率勾三率股弦和勾相減得弦較和末率股弦較四率勾股弦較相減得弦和較此股弦和弦和較相乘所以與勾乘弦較和等積也首率勾弦和一率仍爲勾弦和二率仍爲股中率股三率勾弦股股相減得弦較較末率勾弦較四率股勾弦較相減得弦相較此勾弦和弦和較相乘所以與股乘弦較較等積也

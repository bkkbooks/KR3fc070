body:
  text: 乙已丁辛勾乘弦較和方等積矣故有股弦和弦和較則以兩數相乘爲甲寅丁癸方亦可爲乙已丁辛長方其長邊乙丁闊邊乙已卽甲乙之和卽甲丁股弦和乃用帶縱開方法算之得闊邊乙已爲勾以乙已勾減乙壬弦和較餘壬已爲股弦較與股弦和相加減各折半爲弦與股也勾弦和弦和較相乘與股乘弦較較等積因以勾弦和爲長闊和何也如圖甲乙爲股甲戊等甲丙爲勾丙子等丙丁爲弦則子丁必爲勾弦較午癸午丑寅戊皆等甲丁必爲勾弦和寅癸等以甲乙股與甲丁勾弦和相減餘乙丁爲弦較較以甲戊股與寅戊勾弦較相減餘甲寅爲弦和較說見加減甲戊乙已股方原與寅戊癸辛勾弦較勾弦和相乘方等積若各減一寅戊卯已方又各加一乙卯丁癸方則甲寅丁癸勾弦和弦和較相乘方亦必與乙已丁辛股乘弦較較方等積矣故有勾弦和弦和較則以兩數相乘爲甲寅丁癸長方亦可爲乙已丁辛長方其長邊乙已亦可爲闊邊闊邊乙丁亦可爲長邊之和卽甲丁勾弦和乃用帶縱開方算之得長邊乙已爲股或得闊邊爲乙已以甲乙股減甲寅弦和較餘

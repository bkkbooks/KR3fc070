body:
  text: 勾股六術圖解第一術弦方內兼有一勾方一股方何也如圖甲乙丙勾股庚己甲辛戊庚丙丁辛皆與之等乙丙爲勾甲己戊庚辛丁皆等甲乙爲股庚己辛戊丙丁皆等甲丙爲弦甲庚庚辛辛丙皆等則甲庚丙辛必爲弦自乘方迺移丙丁辛勾股置於甲壬庚移辛戊庚勾股置於丙癸甲又自戊至子作線截之則易爲癸子丙丁一股方子壬戊庚一勾方矣蓋丙丁爲股丙癸亦爲股則癸子丙丁必爲股自乘方戊庚爲勾壬庚亦爲勾則子壬戊庚必爲勾自乘方故勾股求弦以勾方股方相加爲弦方勾弦求股以勾方弦方相減爲股方股弦求勾以股方弦方相減爲勾方皆平方開之得勾股弦也第二術弦方倍之兼有一勾股較方一勾股和方何也如圖甲丁辛勾股形甲丁丙戊爲弦方甲丁爲弦四邊皆等故爲弦方內容甲丁辛丁戊已戊丙庚丙甲乙四勾股積已庚辛乙一勾股較方丁辛股減丁已勾餘已辛爲勾股較辛乙乙庚庚已皆等故爲勾股較方

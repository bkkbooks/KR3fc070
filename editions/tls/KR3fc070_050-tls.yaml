body:
  text: 較丑甲寅丁皆等甲戊必爲勾弦較丁已等戊乙勾減庚乙股弦較餘戊庚甲庚股減甲戊勾弦較亦餘戊庚則戊庚必爲弦和較以弦和較卽勾較較股較較故也說見加減法壬癸壬子皆等壬戊已乙一勾方丙丑寅辛一股方相加旣與丙甲乙丁一弦方等積則丑甲癸戊及寅子丁已勾弦較股弦較相乘兩長方亦必與壬癸子辛弦和較自乘方等積矣葢勾方股方相加較之弦方疊一壬癸子辛方而空丑甲癸戊寅子丁已兩長方則所空者必與所疊者等積故有勾弦較股弦較則以兩較相乘倍之爲丑甲癸戊寅子丁己兩長方亦卽爲壬癸子辛一正方平方法開之得癸辛弦和較卽戊庚置戊庚弦和較加庚乙股弦較得戊乙勾加甲戊勾弦較得甲庚股加庚乙股弦較甲戊勾弦較得甲乙弦又勾弦較股弦較相減卽勾股較說見加減法今丑甲癸戊長方其長闊兩邊旣爲勾弦較股弦較則其兩邊較必爲勾股較故有勾股較弦和較則以弦和較自乘爲壬癸子辛方半之卽丑甲癸戊長方積乃以勾股較爲長闊兩邊較用帶縱開方算之得闊邊爲股弦較長邊爲勾弦較勾弦和股弦和相乘爲長方其長闊較卽勾股較倍

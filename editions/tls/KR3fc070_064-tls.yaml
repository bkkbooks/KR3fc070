body:
  text: 方等積若各減一甲戊乙已方則乙已丁辛股弦較弦較和相乘方亦必與戊壬已癸勾乘弦和較方等積矣故有股弦較弦較和則以兩數相乘爲乙已丁辛長方亦可爲戊壬已癸長方其闊邊戊壬長邊壬癸之較卽甲戊股弦較乃用帶縱開方法算之得長邊壬癸爲勾以甲乙勾加乙丁弦較和得甲丁股弦和與股弦較相加減各折半爲弦與股也勾弦較弦較較相乘與股乘弦和較等積因以勾弦較爲長闊較何也如圖甲乙爲股甲壬壬癸皆等甲丙爲勾丙子等丙丁爲弦則子丁必爲勾弦較子丑甲戊皆等甲丁亦必爲勾弦和以甲乙股與甲丁勾弦和相減餘乙丁爲弦較較以甲壬股與甲戊勾弦較相減餘戊壬爲弦和較說見加減甲壬乙癸股方原與甲戊丁辛勾弦較勾弦和相乘方等積若各減一甲戊乙已長方則乙已丁辛勾弦較弦較較相乘方亦必與戊壬己癸股乘弦和較方等積矣故有勾弦較弦較較則以兩數相乘爲乙已丁辛長方亦可爲戊壬已癸長方其闊邊戊壬長邊壬癸之較卽甲戊勾弦較乃用帶縱開方法算之得長邊壬癸爲股以甲乙股加乙丁弦較較得甲丁

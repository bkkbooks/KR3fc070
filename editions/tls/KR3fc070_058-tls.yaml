body:
  text: 壬癸辰午庚戊辛已兩長方相加然則壬癸勾弦較癸午股弦和相乘倍之爲兩長方亦卽與子戊辰丁弦較和方等積矣故有勾弦較股弦和則以一較一和相乘倍之爲壬癸辰午庚戊辛已兩長方亦卽爲子戊辰丁一正方平方法開之得戊丁弦較和置戊丁弦較和減甲丁股弦和得甲戌勾減戊已勾弦較得已丁股併甲丁股弦和戊已勾弦較與之相減得甲已弦又勾弦較股弦和相減卽勾股和說見加減法今壬癸辰午長方其長闊兩邊旣爲勾弦較股弦和則其兩邊較必爲勾股和故有勾股和弦較和則以弦較和自乘爲子戊辰丁方半之卽壬癸辰午長方積乃以勾股和爲長闊兩邊較用帶縱開方算之得闊邊爲勾弦較長邊爲股弦和以上圖解凡四前二本舊術後二發明新術之所以然葢勾弦較股弦較相乘倍之卽弦和較自乘積勾弦和股弦和相乘倍之卽弦和和自乘積其理顯勾弦和股弦較相乘倍之卽弦較較自乘積勾弦較股弦和相乘倍之卽弦較和自乘積其理隱故舊術第載前二法而法猶未備今特補之并繪圖以著其理亦可見理本同原卽乘除開方之法亦歸一例矣

body:
  text: 方得弦較較取徑迂迥且與前二題法不一例今變通其術使歸於同其實勾弦和股弦較相乘之倍卽弦較較自乘方無事假途於勾股和也第四題有勾弦較有股弦和求勾股弦法以勾弦較股弦和相乘倍之爲實平方開之得弦較和迺置弦較和與股弦和相減爲勾與勾弦較相減爲股併勾弦較股弦和與之相減爲弦是題舊術以勾弦較股弦和相減得勾股和自乘之與股弦和自乘相減又以勾弦較自乘相加開方得弦較和事有同一理而於此顯於彼則奧者非理有顯奧理之所寓有顯奧也是術前二題舊術論之詳矣而未究後二題之本同一理蓋以同名相乘直捷而易明異名相乘雜糅而難見謬爲繹出亦欲使立術歸於一且見名不同理無不同窮理者卽顯以求奧可耳第五術第一題有勾股較有弦和較求勾股弦法以弦和較自乘爲長方積之倍以勾股較爲長闊較用帶縱較數開方算之二因倍積與長闊較自乘相加開平方得長闊和和較相減折半爲股弦較相加折半爲勾弦較如第四術第一題遞加之得勾股弦

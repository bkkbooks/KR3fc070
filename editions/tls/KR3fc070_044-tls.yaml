body:
  text: 爲弦則甲丙卽勾股和乙丁卽勾弦較以甲丙勾股和與甲丁弦相減餘丁丙爲弦和較而此丁丙者又卽乙丙股乙丁勾弦較相減數是亦股與勾弦較之較也故卽股較較弦和和卽勾和和股和和何也如前圖甲乙爲勾乙丙爲股丙丁爲弦則甲丙卽勾股和乙丁卽股弦和以甲丙勾股和與丙丁弦相加得甲丁爲弦和和而此甲丁者又卽甲乙勾乙丁股弦和相加數是亦勾與股弦和之和也故卽勾和和如後圖甲乙爲勾乙丙爲股丁甲爲弦則甲丙卽勾股和丁乙卽勾弦和以甲丙勾股和與丁甲弦相加得丁丙爲弦和和而此丁丙者又卽乙丙股丁乙勾弦和相加數是亦股與勾弦和之和也故卽股和和弦較較卽勾較和股和較何也如前圖甲乙爲勾甲丙爲股丁丙爲弦則乙丙卽勾股較丁甲卽股弦較以乙丙勾股較與丁丙弦相減餘丁乙爲弦較較而丁乙者又卽甲乙勾丁甲股弦較相加數是亦勾與股弦較之和也故卽勾較和如後圖甲乙爲勾甲丙爲股乙丁爲

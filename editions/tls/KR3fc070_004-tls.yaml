body:
  text: 勾股相求舊術詳且備矣惟和較諸題術稍繁雜初學恒未了然乙酉夏偶與邵君魚竹陳君辛伯縱論及此爰取舊術稍爲變通分術爲六使題之相同者通爲一術苟得其意釐然悉有以御之繁雜可無復慮亦足爲入門之一助云第一術第一題有勾有股求弦法以勾股各自乘相併爲實平方開之得弦第二題有勾有弦求股法以勾弦各自乘相減爲實平方開之得股第三題有股有弦求勾法以股弦各自乘相減爲實平方開之得勾第二術第一題有弦有勾股較求勾股法以弦自乘倍之與勾股較自乘相減爲實平方開
  hash: sha256:293c44db6581a17178ed017b7d614e13f4ee8d8498ef17623a2791818063d8a5

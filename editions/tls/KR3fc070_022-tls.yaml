body:
  text: 毋庸自乘相乘加減也第八題有勾弦和有弦和較求勾股弦法以勾弦和弦和較相乘爲長方積以勾弦和爲長闊和用帶縱和數開方算之四因積與長闊和自乘相減開平方得長闊較和較相減折半爲弦較較相加折半爲股若四因積與長闊和自乘相減適盡徑以長闊和折半爲弦較較又爲股弦較較弦和較相加折半爲勾勾減勾弦和爲弦是題得長闊較後三因較加兩弦和較得數小於長闊和或與之等則有兩答如本法求之得一式勾股弦又易弦較較爲股股爲弦較較另得一式勾股弦若得數大於長闊和第可如本法求之不能互易無兩答也捷法四因弦和較與勾弦和相減轉乘勾弦和開方得長闊較是題舊術以勾弦和自乘得數又以勾弦和弦和較相加轉與勾弦和相乘得數兩數相減爲長方積以勾弦和爲長闊和用和數開方算之得長爲股今考其長方積本卽勾弦和弦和較相乘之數毋庸自乘相乘加減也是術八題意本一例意旣同卽立術不容或異今更定之較爲條理井然一絲不紊而錯宗參伍亦莫不各盡其致矣勾股弦及其和較凡十三件任擧二件皆可命題總計之題凡七十有八今六術中題止二十五者以其餘五十三題加減之可易爲術中題也今詳列餘題題其加減法附於六術之後庶和較諸題於是備云

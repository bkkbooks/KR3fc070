body:
  text: 者止四種則第四五術中之四題可以得其故矣首率勾弦較首率仍爲勾弦較中率股中率勾弦較股相減得弦和較末率勾弦和末率勾弦較加勾弦和爲倍弦股倍之爲倍股相減得倍股弦較首率股弦較首率仍爲股弦較中率勾中率股弦較勾相減得弦和較末率股弦和末率股弦較加股弦和爲倍弦勾倍之爲倍勾相減得倍勾弦較此兩種另式連比例中率皆爲弦和較首末率雖不同然以首末相乘要皆爲勾弦較股弦較相乘倍之之數而與中率弦和較自乘等積也首率勾弦和首率仍爲勾弦和中率股中率勾弦和股相加爲弦和和末率勾弦較末率勾弦和加勾弦較爲倍弦股倍之爲倍股相加爲倍股弦和首率股弦和首率仍爲股弦和中率勾中率股弦和勾相加爲弦和和末率股弦較末率股弦和加股弦較爲倍弦勾倍之爲倍勾相加爲倍勾弦和此兩種另式連比例中率皆爲弦和和首末率雖不同然以首末相乘要皆爲勾弦和股弦和相乘倍之之數而與中率弦和和自乘等積也首率勾弦和

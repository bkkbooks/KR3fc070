body:
  text: 若倍之必內容八勾股積二勾股較方矣又壬子癸丑爲勾股和方壬丁勾加丁子股得壬子爲勾股和子丑丑癸癸壬皆等故爲勾股和方內容甲壬丁等八勾股積已庚辛乙一勾股較方比之兩弦方尙少一勾股較方則兩弦方內卽兼有一勾股較方一勾股和方矣故有弦有勾股較以弦自乘倍之爲兩弦方內減勾股較自乘方餘爲勾股和自乘方平方開之得勾股和有弦有勾股和亦以弦自乘倍之爲兩弦方內減勾股和自乘方餘爲勾股較自乘方平方開之得勾股較也第三術凡股弦較股弦和相乘方其積與勾自乘方等勾弦較勾弦和相乘方其積與股自乘方等何也蓋弦方內原兼有一勾方一股方故減股方餘爲勾方減勾方餘爲股方如圖設甲乙爲弦甲丙等庚乙爲股已乙等於甲乙丙丁弦方內減庚乙戊已股方餘甲庚丙戊丁已磬折形必與勾方等積若以磬折形內戊已辛丁長方移至丙辛壬癸位則磬折形易

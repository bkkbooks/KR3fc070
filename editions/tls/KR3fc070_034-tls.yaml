body:
  text: 以上五題加減之皆可得股與勾弦較迺以第三術第三題求勾弦法算之有股有弦較較求勾弦法以股與弦較較相加爲勾弦和有股有弦和和求勾弦法以股與弦和和相減爲勾弦和有勾弦和有弦較較求勾股弦法以勾弦和弦較較相減爲股有勾弦和有弦和和求勾股弦法以勾弦和弦和和相減爲股有弦較較有弦和和求勾股弦法以弦較較弦和和相減折半爲股相加折半爲勾弦和以上五題加減之皆可得股與勾弦和迺以第三術第四題求勾弦法算之有勾股較有股弦較求勾股弦法以勾股較股弦較相加爲勾弦較有勾股較有勾弦較求勾股弦法以勾股較勾弦較相減爲股弦較以上二題加減之皆可得勾弦較股弦較迺以第

body:
  text: 首率股弦較一率仍爲股弦較二率仍爲勾中率勾三率股弦較勾相加得弦較較末率股弦和四率勾股弦和相加得弦和和此股弦較弦和和相乘所以與勾乘弦較較等積也首率勾弦較一率仍爲勾弦較二率仍爲股中率股三率勾弦較股相加得弦較和末率勾弦和四率股勾弦和相加得弦和和此勾弦較弦和和相乘所以與股乘弦較和等積也首率股弦較一率仍爲股弦較二率仍爲勾中率勾三率股弦較勾相減得弦和較末率股弦和四率勾股弦和相減得弦較和此股弦較弦較和相乘所以與勾乘弦和較等積也首率勾弦較一率仍爲勾弦較二率仍爲股中率股三率勾弦較股相減得弦和較末率勾弦和四率股勾弦和相減得弦較較此勾弦較弦較較相乘所以與股乘弦和較等積也

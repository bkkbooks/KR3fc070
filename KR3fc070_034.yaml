body:
  text: 以上五題加減之皆可得股與勾弦較乃以第三術第三題求勾弦法算之有股有弦較較求勾弦法以股與弦較較相加為勾弦和有股有弦和和求勾弦法以股與弦和和相減為勾弦和有勾弦和有弦較較求勾股弦法以勾弦和弦較較相減為股有勾弦和有弦和和求勾股弦法以勾弦和弦和和相減為股有弦較較有弦和和求勾股弦法以弦較較弦和和相減折半為股相加折半為勾弦和以上五題加減之皆可得股與勾弦和乃以第三術第四題求勾弦法算之有勾股較有股弦較求勾股弦法以勾股較股弦較相加為勾弦較有勾股較有勾弦較求勾股弦法以勾股較勾弦較相減為股弦較以上二題加減之皆可得勾弦較股弦較乃以第

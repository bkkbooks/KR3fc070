body:
  text: 併已丁股弦較甲卯勾弦和與之相減卽甲丁弦又勾弦和股弦較相減卽勾股和說見加減法今丑已癸丁長方其長闊兩邊旣爲勾弦和股弦較則其兩邊較必爲勾股和故有勾股和弦較較則以弦較較自乘爲丑庚辛子方半之卽丑已癸丁長方積乃以勾股和爲長闊兩邊較用帶縱開方算之得闊邊爲股弦較長邊爲勾弦和勾弦較股弦和相乘爲長方其長闊較卽勾股和倍其積與弦較和自乘方等何也如圖甲已爲弦癸卯乙癸皆等已丁爲股卯已等甲戊爲勾乙壬壬子皆等則壬癸戊已皆卽勾弦較癸午庚戊皆卽股弦和甲戊勾減甲丁股弦和得戊丁已丁股加戊已勾弦較亦得戊丁則戊丁必爲弦較和以弦較和卽勾和較股較和也說見加減法辰丁等乙癸辛卯弦方內減去乙壬庚子勾方餘辛庚卯子癸壬磬折形必與卯已午丁股方等積此股方若加一辰午子卯戊已磬折形卽爲子戊辰丁弦較和自乘方則辛庚卯子癸壬磬折形若加一辰午子卯戊已磬折形亦必爲子戊辰丁弦較和自乘方而此兩磬折形相加原不異於
  hash: sha256:1dd144cc619185d0cc22b0ec8e45d7788eb10c0b0a6571f32969100cea8be73d

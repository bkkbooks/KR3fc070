body:
  text: 併已丁股弦較甲卯勾弦和與之相減即甲丁弦又勾弦和股弦較相減即勾股和説見加減法今丑已癸丁長方其長闊兩邊既為勾弦和股弦較則其兩邊較必為勾股和故有勾股和弦較較則以弦較較自乘為丑庚辛子方半之即丑已癸丁長方積乃以勾股和為長闊兩邊較用帶縱開方算之得闊邊為股弦較長邊為勾弦和勾弦較股弦和相乘為長方其長闊較即勾股和倍其積與弦較和自乘方等何也如圖甲已為弦癸卯乙癸皆等已丁為股卯已等甲戊為勾乙壬壬子皆等則壬癸戊已皆即勾弦較癸午庚戊皆即股弦和甲戊勾減甲丁股弦和得戊丁已丁股加戊已勾弦較亦得戊丁則戊丁必為弦較和以弦較和即勾和較股較和也説見加減法辰丁等乙癸辛卯弦方內減去乙壬庚子勾方餘辛庚卯子癸壬磬折形必與卯已午丁股方等積此股方若加一辰午子卯戊已磬折形即為子戊辰丁弦較和自乘方則辛庚卯子癸壬磬折形若加一辰午子卯戊已磬折形亦必為子戊辰丁弦較和自乘方而此兩磬折形相加原不異於
  hash: sha256:39aca52709414868d2de45ffdaace9ac841c859bf441a46bc8b9bf53d57704f9

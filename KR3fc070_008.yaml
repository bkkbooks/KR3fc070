body:
  text: 法以股自乘爲實勾弦和爲法除之得勾弦較和較相加折半爲弦相減折半爲勾第四術第一題有勾弦較有股弦較求勾股弦法以勾弦較股弦較相乘倍之爲實平方開之得弦和較迺置弦和較與股弦較相加爲勾與句弦較相加爲股併勾弦較股弦較與之相加爲弦第二題有勾弦和有股弦和求勾法以勾弦和股弦和相乘倍之爲實平方開之得弦和和迺置弦和和與股弦和相減爲勾與勾弦和相減爲股併勾弦和股弦和與之相減爲弦此以上諸法悉從舊術以下兩題術爲新定第三題有勾弦和有股弦較求勾股弦法以勾弦和股弦較相乘倍之爲實平方開之得弦較較迺置弦較較與股弦較相減爲勾與勾弦和相減爲股併勾弦和股弦較與之相減爲弦是題舊術以勾弦和股弦較相減得勾股和自乘之與勾弦和自乘相減又以股弦較自乘相加開

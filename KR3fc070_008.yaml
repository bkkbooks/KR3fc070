body:
  text: 法以股自乘為實勾弦和為法除之得勾弦較和較相加折半為弦相減折半為勾第四術第一題有勾弦較有股弦較求勾股弦法以勾弦較股弦較相乘倍之為實平方開之得弦和較乃置弦和較與股弦較相加為勾與句弦較相加為股併勾弦較股弦較與之相加為弦第二題有勾弦和有股弦和求勾法以勾弦和股弦和相乘倍之為實平方開之得弦和和乃置弦和和與股弦和相減為勾與勾弦和相減為股併勾弦和股弦和與之相減為弦此以上諸法悉從舊術以下兩題術為新定第三題有勾弦和有股弦較求勾股弦法以勾弦和股弦較相乘倍之為實平方開之得弦較較乃置弦較較與股弦較相減為勾與勾弦和相減為股併勾弦和股弦較與之相減為弦是題舊術以勾弦和股弦較相減得勾股和自乘之與勾弦和自乘相減又以股弦較自乘相加開

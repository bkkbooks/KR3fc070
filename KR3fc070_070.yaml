body:
  text: 乙已丁辛勾乘弦較和方等積矣故有股弦和弦和較則以兩數相乘為甲寅丁癸方亦可為乙已丁辛長方其長邊乙丁闊邊乙已即甲乙之和即甲丁股弦和乃用帶縱開方法算之得闊邊乙已為勾以乙已勾減乙壬弦和較餘壬已為股弦較與股弦和相加減各折半為弦與股也勾弦和弦和較相乘與股乘弦較較等積因以勾弦和為長闊和何也如圖甲乙為股甲戊等甲丙為勾丙子等丙丁為弦則子丁必為勾弦較午癸午丑寅戊皆等甲丁必為勾弦和寅癸等以甲乙股與甲丁勾弦和相減餘乙丁為弦較較以甲戊股與寅戊勾弦較相減餘甲寅為弦和較說見加減甲戊乙已股方原與寅戊癸辛勾弦較勾弦和相乘方等積若各減一寅戊卯已方又各加一乙卯丁癸方則甲寅丁癸勾弦和弦和較相乘方亦必與乙已丁辛股乘弦較較方等積矣故有勾弦和弦和較則以兩數相乘為甲寅丁癸長方亦可為乙已丁辛長方其長邊乙已亦可為闊邊闊邊乙丁亦可為長邊之和即甲丁勾弦和乃用帶縱開方算之得長邊乙已為股或得闊邊為乙已以甲乙股減甲寅弦和較餘

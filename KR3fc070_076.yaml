body:
  text: 率必為原首率末率相加更加倍中率之數原首率三另首率仍為三式連比中率九式連比中率三九相減得六例末率二十七例末率三加二十七得三十倍九得十八相減得十二如圖原式連比例首率三中率九末率二十七今仍其首率為三而以首率三與中率九相減得六為中率中率六自乘首率三除之得十二為末率此末率十二即原式首率三末率二十七相加得三十轉減倍中率十八之數而成另式連比例矣此相減而得者也原首率四另首率仍為四式連比中率六式連比中率四六相加得十例末率九例末率四加九得十三倍六得十二相加得二十五如圖原式連比例首率四中率六末率九今仍其首率為四而以首率四與中率六相加得十為中率中率十自乘首率四除之得二十五為末率此末率二十五即原式首率四末率九相加得十三更加倍中率十二之數而成另式連比例矣此相加而得者也今第三術中有兩種連比例若更互如法求之可得八種另式連比例比例雖八種而因比例以成同積

body:
  text: 第二題有勾股較有弦和和求勾股弦法以弦和和自乘為長方積之倍以勾股較為長闊較用帶縱較數開方算之二因倍積與長闊較自乘相加開平方得長闊和和較相減折半為勾弦和相加折半為股弦和如第四術第二題遞減之得勾股弦以上兩題俱從舊術下兩題及第六術皆新立第三題有勾股和有弦較較求勾股弦法以弦較較自乘為長方積之倍以勾股和為長闊較用帶縱較數開方算之二因倍積與長闊較自乘相加開平方得長闊和和較相減折半為股弦較相加折半為勾弦和如第四術第三題遞減之得勾股弦是題舊術以勾股和自乘得數又以勾股和弦較較相加自乘得數兩數相減折半為長方積倍弦較較加勾股和為長闊和用帶縱和數開方算之得闊為勾第四題有勾股和有弦較和求勾股弦法以弦較和自乘為長方積之倍以勾股和為長闊
  hash: sha256:32add1a2e128deea36a2da69894e3adb702548b0249e3c1c6ad70381dfa2fb30

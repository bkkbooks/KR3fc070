body:
  text: 弦較小於倍股弦較者較必小於和三之一三其較必小於一勾弦較倍股弦較之和加兩弦和較必小於長闊和半其勾弦較大於倍股弦較者較必大於和三之一三其較必大於一勾弦較倍股弦較之和加兩弦和較必大於長闊和故三長闊較兩弦和較相加與長闊和比其大小猶之以半勾弦較與倍股弦較比其大小可以定兩答之有無也重論第四五六術以上圖解第一二三術及第四術之前二題悉本舊解餘為更定術亦各為圖解明其意伏而審之第四五六術其原皆出於第三術可釋之以比例第三術以勾弦較比股若股與勾弦和以股弦較比勾若勾與股弦和是為三率連比例凡有比例加減之其和較亦可互相比例今第四五六術諸題皆可由第三術之題加減而得即可因第三術之比例而另生比例因比例以成同積而諸術開方之所以然遂於是得試詳論如左凡有連比率三率仍其首率而以首率中率相減為中率則其末率必為原首率末率相加轉減倍中率之數仍其首率而以首率中率相加為中率則其末
